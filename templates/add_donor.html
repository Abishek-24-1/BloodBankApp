<!DOCTYPE html>
<html>
<head>
    <title>Add Donor</title>
</head>

<body>

<h2>🩸 Add New Donor</h2>

<form action="/add_donor" method="POST">

    <input name="Name" placeholder="Name" required><br><br>

    <input name="Address" placeholder="Address" required><br><br>

    <input name="IDCardNumber" placeholder="Aadhaar Number" required><br><br>

    <input name="Phone" placeholder="Phone" required><br><br>

    <input name="BloodGroup" placeholder="Blood Group" required><br><br>

    <input type="date" name="LastDonationDate" required><br><br>

    <input name="InfectionStatus" placeholder="Negative / Positive" required><br><br>

    <input name="AadhaarImage" placeholder="images/aadhaar1.jpg" required><br><br>

    <button type="submit">Add Donor</button>

</form>

<br>

<a href="/">
    <button>Back to Home</button>
</a>

</body>
</html>
